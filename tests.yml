version: 2

models:
  - name: silver_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: email
        tests:
          - not_null

  - name: silver_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: unit_price
        tests:
          - not_null

  - name: silver_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: silver_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique